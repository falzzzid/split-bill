<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Split Bill Pro v3</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script src="https://cdn.tailwindcss.com"></script>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

</head>

<body class="bg-gray-100">

<div id="root"></div>

<script type="text/babel">

const {useState,useEffect,useMemo} = React

const firebaseConfig = {

apiKey:"AIzaSyB8TSDljVuxeeyLqlfaNA8dG7NY9zCkxiE",
authDomain:"split-bill-xpl.firebaseapp.com",
databaseURL:"https://split-bill-xpl-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"split-bill-xpl"

}

firebase.initializeApp(firebaseConfig)
const db = firebase.database()

const format = n => n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,".")
const parseNum = v => parseInt(v.replace(/\./g,""))||0

function randomBill(){
return Math.random().toString(36).substr(2,6)
}

function App(){

const params = new URLSearchParams(location.search)

let billId = params.get("bill")

if(!billId){
billId = randomBill()
location.search="?bill="+billId
}

let userId = localStorage.getItem("splitUser")

if(!userId){
userId = "u"+Math.random().toString(36).substr(2,9)
localStorage.setItem("splitUser",userId)
}

const [users,setUsers] = useState({})
const [items,setItems] = useState({})
const [name,setName] = useState("")

useEffect(()=>{

const ref = db.ref("bills/"+billId)

ref.child("users").on("value",s=>{
setUsers(s.val()||{})
})

ref.child("items").on("value",s=>{
setItems(s.val()||{})
})

},[])

function join(){

if(!name) return

db.ref("bills/"+billId+"/users/"+userId).set({
name:name
})

}

function updateUser(uid,val){
db.ref("bills/"+billId+"/users/"+uid+"/name").set(val)
}

function resetUsers(){

if(!confirm("Reset semua user?")) return

db.ref("bills/"+billId+"/users").remove()

}

function addItem(){

const id = Date.now()

db.ref("bills/"+billId+"/items/"+id).set({
id,
name:"",
price:0,
qty:1,
selectedBy:{}
})

}

function deleteItem(id){
db.ref("bills/"+billId+"/items/"+id).remove()
}

function updateItem(id,key,val){

db.ref("bills/"+billId+"/items/"+id+"/"+key).set(
key==="price" ? parseNum(val) : val
)

}

function toggle(itemId,uId){

const ref = db.ref(`bills/${billId}/items/${itemId}/selectedBy/${uId}`)

ref.once("value",snap=>{
if(snap.exists()) ref.remove()
else ref.set(true)
})

}

function resetItems(){

if(!confirm("Reset semua item?")) return

db.ref("bills/"+billId+"/items").remove()

}

const totals = useMemo(()=>{

let t={}

Object.entries(users).forEach(([id,u])=>{
t[id]=0
})

Object.values(items).forEach(i=>{

const arr = Object.keys(i.selectedBy||{})

if(!arr.length) return

const totalItem = (i.price||0) * (i.qty||1)

const share = totalItem / arr.length

arr.forEach(uid=>{
t[uid]+=share
})

})

return t

},[items,users])

const totalBill = Object.values(items).reduce(
(a,b)=>a+((b.price||0)*(b.qty||1)),0
)

function copyBill(){

let txt="🧾 Split Bill\n\n"

Object.entries(totals).forEach(([uid,val])=>{
txt+=`${users[uid]?.name} : Rp ${format(Math.round(val))}\n`
})

navigator.clipboard.writeText(txt)

alert("Bill copied")

}

return(

<div className="max-w-xl mx-auto p-4">

<h1 className="text-2xl font-bold mb-4">
Split Bill Pro v3
</h1>

{!users[userId] && (

<div className="bg-white p-4 rounded shadow mb-4">

<input
placeholder="Nama"
value={name}
onChange={e=>setName(e.target.value)}
className="border p-2 w-full mb-2"
/>

<button
onClick={join}
className="bg-indigo-600 text-white px-4 py-2 rounded w-full"
>
Join Bill
</button>

</div>

)}

<div className="bg-white p-4 rounded shadow mb-4">

<h2 className="font-bold mb-2">Users</h2>

<div className="flex flex-wrap gap-2">

{Object.entries(users).map(([id,u])=>

<input
key={id}
value={u.name}
onChange={e=>updateUser(id,e.target.value)}
className={`px-3 py-1 rounded-full text-sm
${id===userId?"bg-indigo-600 text-white":"bg-gray-200"}
`}
/>

)}

</div>

<button
onClick={resetUsers}
className="mt-3 w-full bg-red-500 text-white py-2 rounded"
>
Reset Users
</button>

</div>

<div className="space-y-3">

{Object.values(items).map(item=>

<div key={item.id} className="bg-white p-3 rounded shadow">

<div className="flex gap-2 mb-2">

<input
value={item.name}
placeholder="Item"
onChange={e=>updateItem(item.id,"name",e.target.value)}
className="border p-2 flex-1"
/>

<input
value={format(item.price)}
onChange={e=>updateItem(item.id,"price",e.target.value)}
className="border p-2 w-24 text-right"
/>

<input
value={item.qty}
onChange={e=>updateItem(item.id,"qty",parseInt(e.target.value)||1)}
className="border p-2 w-16 text-center"
/>

<button
onClick={()=>deleteItem(item.id)}
className="bg-red-500 text-white px-3 rounded"
>
✕
</button>

</div>

<div className="flex flex-wrap gap-2">

{Object.entries(users).map(([uid,u])=>

<button
key={uid}
onClick={()=>toggle(item.id,uid)}
className={`px-3 py-1 text-xs rounded border
${item.selectedBy?.[uid]?"bg-indigo-600 text-white":"bg-gray-200"}
`}
>
{u.name}
</button>

)}

</div>

</div>

)}

<button
onClick={addItem}
className="w-full border-dashed border-2 py-2 rounded"
>
+ tambah item
</button>

</div>

<div className="mt-6 bg-white p-4 rounded shadow">

<h2 className="font-bold mb-2">Total</h2>

{Object.entries(totals).map(([uid,val])=>

<div key={uid} className="flex justify-between">
<span>{users[uid]?.name}</span>
<span>Rp {format(Math.round(val))}</span>
</div>

)}

<hr className="my-2"/>

<div className="flex justify-between font-bold">
<span>Total Bill</span>
<span>Rp {format(totalBill)}</span>
</div>

</div>

<div className="grid grid-cols-3 gap-2 mt-4">

<button
onClick={copyBill}
className="bg-green-600 text-white py-2 rounded"
>
Copy Bill
</button>

<button
onClick={resetItems}
className="bg-red-600 text-white py-2 rounded"
>
Reset Items
</button>

<button
onClick={resetUsers}
className="bg-red-700 text-white py-2 rounded"
>
Reset Users
</button>

</div>

</div>

)

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>

</body>
</html>
